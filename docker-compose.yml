version: '3.8'

services:
  # PostgreSQL Database (Supabase)
  postgres:
    image: postgres:16-alpine
    container_name: leadengine-postgres
    environment:
      POSTGRES_DB: leadengine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadengine

  # Redis for Caching & BullMQ
  redis:
    image: redis:7-alpine
    container_name: leadengine-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadengine

  # Ollama for Local LLM (optional, can be external)
  ollama:
    image: ollama/ollama:latest
    container_name: leadengine-ollama
    ports:
      - '11434:11434'
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - leadengine
    pull_policy: always
    # Uncomment to auto-pull model on startup
    # command: serve &
    # sleep 2 && ollama pull llama2

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadengine-backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/leadengine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:3000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      CORS_ORIGIN: http://localhost:5173
      OLLAMA_API_URL: http://ollama:11434
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - leadengine
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadengine-frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:3000}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/node_modules:/app/node_modules
    networks:
      - leadengine

  # Python Workers (for crawling, extraction, etc.)
  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: leadengine-workers
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:3000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      WORKER_CONCURRENCY: 4
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./workers/src:/app/src
    networks:
      - leadengine

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  leadengine:
    driver: bridge
